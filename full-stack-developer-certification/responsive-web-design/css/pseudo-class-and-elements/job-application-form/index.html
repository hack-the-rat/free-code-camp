<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Job Application Form</title>
    </head>
    <body>
        <div class="container">
            <h1>Software Job Application Form</h1>
            <form action="" id="job-application">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name..." required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address..." required>
                <label for="position">Position:</label>
                <select name="position" id="position" required>
                    <option value>Select the position you're applying for...</option>
                    <option value="full-stack">Full-Stack Software Engineer</option>
                    <option value="front-end-developer">Front-End Developer</option>
                    <option value="back-end-developer">Back-End Developer</option>
                    <option value="ui-ux-engineer">UI/UX Engineer</option>
                    <option value="game-developer">Game Developer</option>
                    <option value="software-analyst">Software Analyst</option>
                    <option value="cybersecurity">Cybersecurity Engineer</option>
                    <option value="machine-learning">Machine Learning Engineer</option>
                    <option value="blockchain">Blockchain Programmer</option>
                    <option value="product-management">Product Manager</option>
                    <option value="qa-engineer">Quality Assistance (QA) Engineer</option>
                </select>
                <fieldset class="radio-group">
                    <legend>Availability:</legend>
                    <input type="radio" id="full-time" name="availability" value="full-time" checked>
                    <label for="full-time">Full Time</label>
                    <input type="radio" id="part-time" name="availability" value="part-time">
                    <label for="part-time">Part-Time</label>
                    <input type="radio" id="internship" name="availability" value="internship">
                    <label for="internship">Intern</label>
                </fieldset>
            </form>
        </div>
    </body>
</html>
