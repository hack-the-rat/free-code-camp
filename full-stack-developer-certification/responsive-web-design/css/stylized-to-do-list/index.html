<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Styled To-Do List</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <h1>My To-Do List</h1>
            <ul class="todo-list">
                <li>
                    <input type="checkbox" id="first-task">
                    <label for="first-task">Order a Gaming Laptop</label>
                    <ul class="sub-item">
                        <li>
                            <a href="https://www.ibuypower.com/" target="_blank" class="sub-item-link">Link to the store</a>
                        </li>
                    </ul>
                </li>
                <li>
                    <input type="checkbox" id="second-task">
                    <label for="second-task">Complete Book Report</label>
                    <ul class="sub-item">
                        <li>
                            <a href="https://onedrive.live.com/login" target="_blank" class="sub-item-link">Login to OneDrive File</a>
                        </li>
                    </ul>
                </li>
                <li>
                    <input type="checkbox" id="third-task">
                    <label for="third-task">Pay Phone Bill</label>
                    <ul class="sub-item">
                        <li>
                            <a href="https://www.metrobyt-mobile.com/login/start?callback_uri=https://www.metrobyt-mobile.com/payment/make-payment#authenticated" target="_blank" class="sub-item-link">Metro Pay Bill</a>
                        </li>
                    </ul>
                </li>
                <li>
                    <input type="checkbox" id="last-task">
                    <label for="last-task">Book an Eye Doctor Appointment</label>
                    <ul class="sub-item">
                        <li>
                            <a href="https://www.drantonacos.com/" target="_blank" class="sub-item-link">Appointment Link</a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </body>
</html>
