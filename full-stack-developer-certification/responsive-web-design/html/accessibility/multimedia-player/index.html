<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Multimedia Player</title>
    </head>

    <body>
        <h1>Multimedia Player</h1>
        <section>
            <h2>Now Playing: Franz Liszt - Hungarian Rhapsody No. 2</h2>
            <audio controls aria-label="Audio Player for Hungarian Rhapsody Mo. 2">
                <source src="https://dn720307.ca.archive.org/0/items/lp_hungarian-rhapsodies_franz-liszt-blint-vzsonyi_0/disc1/02.04.%20No.%202%20In%20C-Sharp%20Minor.mp3" type="audio/mpeg">
            </audio>
        </section>
        <section>
            <h2>What Is the Lab Method and How Does it Work?</h2>
            <video controls width="600" aria-label="What Is the Lab Method and How Does It Work?">
                <source src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4" type="video/mp4">
                <track src="what-is-a-map-method.vtt" kind="captions" srclang="en" label="English" default="">
            </video>
        </section>
        <section>
            <h2>Transcript</h2>
        </section>
    </body>

</html>
