<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Checkout Page</title>
    </head>
    <body>
        <h1>Checkout</h1>
        <section>
            <h2>Your Cart</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/Android_vector.jpg" alt="Android App Pack">
            <p>Android App Pack</p>
            <p>$94.99</p>
        </section>
        <section>
            <h2>Payment Information</h2>
            <form action="/submit-payment" method="POST">
                <div>
                    <label for="card-name">
                        Cardholder Name 
                        <span aria-hidden="true">*</span>
                    </label>
                    <input type="text" id="card-name" name="card-name" placeholder="John Doe" required>
                </div>
                <div>
                    <label for="card-number">
                        Cardholder Number 
                        <span aria-hidden="true">*</span>
                    </label>
                    <input type="text" id="card-number" name="card-number" placeholder="1234567890123456" aria-describedby="card-number-help" required>
                    <p id="card-number-help">Please enter your 16-digit card number without spaces or dashes.</p>
                </div>
                <div>
                    <label for="expiration-date">
                        Expiration Date 
                        <span aria-hidden="true">*</span>
                    </label>
                    <input type="text" id="expiration-date" name="expiration-date" placeholder="MM/YYYY" required>
                </div>
                <div>
                    <label for="cvv">
                        CVV 
                        <span aria-hidden="true">*</span>
                    </label>
                    <input type="text" id="cvv" name="cvv" placeholder="123" required aria-label="Card Verification Value">
                </div>
                <div>
                    <label for="zipcode">
                        Zipcode 
                        <span aria-hidden="true">*</span>
                    </label>
                    <input type="text" id="zipcode" name="zipcode" placeholder="12345" required>
                </div>
                <input type="submit" value="Place Order">
            </form>
        </section>
    </body>
</html>
