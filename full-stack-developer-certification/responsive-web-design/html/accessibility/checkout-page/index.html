<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <title>Checkout Page</title>
    </head>

    <body>
        <h1>Checkout</h1>
        <section>
            <h2>Your Cart</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e6/Android_vector.jpg" alt="Android App Pack">
            <p>Android App Pack</p>
            <p>$94.99</p>
        </section>
        <section>
            <h2>Payment Information</h2>
            <form action="/submit-payment" method="POST">
                <div>
                    <label for="card-name">
                        "Cardholder Name "
                        <span aria-hidden="true">*</span>
                    </label>
                    <input type="text" id="card-name" name="card-name" required>
                </div>
                <div></div>
                <div></div>
                <div></div>
            </form>
        </section>
    </body>

</html>
